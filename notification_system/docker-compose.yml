version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - notification-data:/app/data
      - ./logs:/app/logs
    networks:
      - notification-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: notification-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notification-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 日志收集 (可选，使用 Loki)
  loki:
    image: grafana/loki:2.9.0
    container_name: notification-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - notification-network
    restart: unless-stopped
    profiles:
      - monitoring

  # 日志可视化 (可选)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: notification-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - notification-network
    restart: unless-stopped
    profiles:
      - monitoring
    depends_on:
      - loki

networks:
  notification-network:
    driver: bridge

volumes:
  notification-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local